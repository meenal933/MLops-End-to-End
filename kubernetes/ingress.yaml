apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: image-caption-ingress
  namespace: spe-project
spec:
  ingressClassName: nginx
  rules:
  - host: ai-tools   # ✅ THIS IS MUST
    http:
      paths:
      - path: /api/caption
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80

      - path: /api/object
        pathType: Prefix
        backend:
          service:
            name: object-detector-service
            port:
              number: 80

      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
